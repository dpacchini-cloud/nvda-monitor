name: Refresh signals

on:
  schedule:
    - cron: '17 12 * * *'   # 12:17 UTC daily
  workflow_dispatch: {}      # manual trigger from the Actions tab

permissions:
  contents: write

# Prevent overlapping runs from racing each other on the push
concurrency:
  group: refresh-signals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch signals
        run: python fetch_signals.py > signals.json

      - name: Show output
        run: cat signals.json

      - name: Commit and push if changed
        run: |
          git config user.name  "signals-bot"
          git config user.email "signals-bot@users.noreply.github.com"
          git add signals.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: refresh signals $(date -u +%F)"
          # Retry push up to 5 times, rebasing on top of any new remote commits each time
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Push $i rejected — pulling with rebase and retrying."
            git pull --rebase --autostash origin main || true
            sleep 3
          done
          echo "Failed to push after 5 attempts."
          exit 1
