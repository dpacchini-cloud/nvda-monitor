name: Refresh signals

on:
  schedule:
    - cron: '17 12 * * *'   # 12:17 UTC daily — off the top of the hour to dodge congestion
  workflow_dispatch: {}      # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch signals
        run: python fetch_signals.py > signals.json

      - name: Show output
        run: cat signals.json

      - name: Commit if changed
        run: |
          git config user.name  "signals-bot"
          git config user.email "signals-bot@users.noreply.github.com"
          git add signals.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh signals $(date -u +%F)"
            git push
          fi
